source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/rules.conf
source = $HOME/.config/hypr/start.conf
source = $HOME/.config/hypr/keybinds.conf
source = $HOME/.config/hypr/anima.conf
source = $HOME/.config/hypr/decor.conf
source = $HOME/.config/hypr/env.conf
source = $HOME/.config/hypr/general.conf
source = $HOME/.config/hypr/inputs.conf
source = $HOME/.config/hypr/layout.conf
source = $HOME/.config/hypr/perms.conf




# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    }
